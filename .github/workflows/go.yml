name: Go build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install C toolchain (CGO / libsql)
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.943

      - name: Generate
        run: go generate ./...

      - name: Build
        run: CGO_ENABLED=1 go build -v ./...

      - name: Test
        run: CGO_ENABLED=1 go test -v ./...
